<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tableau Map | Predictive Policing London</title>
    <meta
      name="description"
      content="Standalone Tableau map view for the Predictive Policing London dashboard."
    />
    <meta name="theme-color" content="#0D1117" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0d1117;
        color: #e6edf3;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .page {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(13, 17, 23, 0.92);
      }

      .title {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .back-link {
        color: #9da7b1;
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 999px;
        padding: 0.4rem 0.8rem;
        font-size: 0.85rem;
        white-space: nowrap;
      }

      .back-link:hover {
        color: #e6edf3;
        border-color: rgba(255, 255, 255, 0.3);
      }

      .frame-wrap {
        width: 100%;
        height: 100%;
      }

      .tableau-frame {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #0d1117;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <h1 class="title">Tableau Crime Map</h1>
        <a class="back-link" href="dashboard.html">Back to dashboard</a>
      </header>
      <div class="frame-wrap">
        <iframe
          class="tableau-frame"
          src="https://public.tableau.com/views/Crime-Dashboard-London-Metropolitan-Police-District/CrimeData?:showVizHome=no&:embed=true"
          title="Tableau crime map"
          loading="lazy"
          referrerpolicy="no-referrer"
          allowfullscreen
        ></iframe>
      </div>
    </main>
  </body>
</html>
